version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: exam_portal_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    image: asifaa89/exam-backend:latest
    container_name: exam_portal_backend
    restart: always
    ports:
      - "5002:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/exam_portal
    depends_on:
      - mongodb
    volumes:
      - backend_db:/usr/src/app/database

  frontend:
    build: ./frontend
    image: asifaa89/exam-frontend:latest
    container_name: exam_portal_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_db:
  mongodb_data:
